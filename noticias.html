<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornal</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="img/favicon/edit.png">
</head>
<body>
    <header>
        <div class="logo">
            Ouro Viagens
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="pontos.html">Pontos turisticos</a>
            <a href="noticias.html">Jornal</a>
        </nav>
    </header>
    <main>
        <section class="fundo-texto">
            <h2>Se increva a nosso jornal digital e fique por dentro de todas as novidades na cidade</h2>
                <div class="formulario">
                    <div class="input">
                        <label for="nome">Nome completo</label> <br>
                        <input type="text" id="nome" name="nome" placeholder="Joao Silva">
                    </div>
                    <div class="input">
                        <label for="email">E-mail</label> <br>
                        <input type="email" id="email" nome="email" placeholder="joao.silva@gmail.com">
                    </div>
                    <div class="input">
                        <label for="telefone">Telefone</label> <br>
                        <input type="tel" id="telefone" name="telefone" pattern="[0-9]{2}-[0-9]{5}-[0-9]{4}" placeholder="(31) 98765-4321" maxlength="11">
                    </div>
                    <div class="input">
                        <input type="submit" value="Gravar">
                    </div>
                </div>
        </section>
    </main>
    <footer>
        <div>
            <p>Contato</p>
            <p>Ouro@viagens.com</p>
        </div>
        <div>
            <p>Direitos reservados</p>
        </div>
    </footer>
</body>
</html>
